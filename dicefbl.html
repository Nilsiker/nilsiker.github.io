<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Year Zero: Dice Roller</title>
  <link rel="stylesheet" type="text/css" href="css/master.css">
  <script src="scripts.js"></script>
  <link rel="shortcut icon" type="image/x-icon" href="media/favicon.ico">
</head>

<body onload="setGame('fbl'); hideDice();">
  <div class="wrapper">
    <div class="menu" style="text-align: left">
      <h2>
        <a href="dice.html" class="menu" style="color: goldenrod;">⬅ Back</a>
        <select style="width: auto" onchange="if (this.value) window.location.href=this.value">
          <option value="dicefbl">Forbidden Lands</option>
          <option value="dicemut.html">Mutant</option>
        </select>
      </h2>
      
    </div>

  <div class="container">
    <div class="window">
      <p style="text-align: center; color: white"><b>Modifiers</b>
        <input type="number" id="Bonus" onfocus="this.select();" class="fblskill" style="width: 45px">
        <input type="number" id="Gear" onfocus="this.select();" class="item">
      </p>
      <button type="button" onclick="rollBase('STR')" class="fblbase">STR</button>
      <input type="number" id="vSTR" onfocus="this.select();" value="2">
      <input type="number" id="tSTR" onfocus="this.select();" class="damage">

      <button type="button" onclick="rollBase('AGI')" class="fblbase">AGI</button>
      <input type="number" id="vAGI" onfocus="this.select();" value="2">
      <input type="number" id="tAGI" onfocus="this.select();" class="damage">
      <br>
      <button type="button" onclick="rollBase('WIT')" class="fblbase">WIT</button>
      <input type="number" id="vWIT" onfocus="this.select();" value="2">
      <input type="number" id="tWIT" onfocus="this.select();" class="damage">

      <button type="button" onclick="rollBase('EMP')" class="fblbase">EMP</button>
      <input type="number" id="vEMP" onfocus="this.select();" value="2">
      <input type="number" id="tEMP" onfocus="this.select();" class="damage">

      <br>

      <button type="button" onclick="roll('1')" class="fblskill">Might</button>
      <input type="number" id="1" onfocus="this.select();">

      <button type="button" onclick="roll('2')" class="fblskill">Endurance</button>
      <input type="number" id="2" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('3')" class="fblskill">Melee</button>
      <input type="number" id="3" onfocus="this.select();">

      <button type="button" onclick="roll('31')" class="fblskill">Crafting</button>
      <input type="number" id="31" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('4')" class="fblskill">Stealth</button>
      <input type="number" id="4" onfocus="this.select();">

      <button type="button" onclick="roll('5')" class="fblskill">Move</button>
      <input type="number" id="5" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('6')" class="fblskill">Sleight of Hand</button>
      <input type="number" id="6" onfocus="this.select();">

      <button type="button" onclick="roll('61')" class="fblskill">Marksmanship</button>
      <input type="number" id="61" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('7')" class="fblskill">Scouting</button>
      <input type="number" id="7" onfocus="this.select();">
      
      <button type="button" onclick="roll('8')" class="fblskill">Lore</button>
      <input type="number" id="8" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('9')" class="fblskill">Survival</button>
      <input type="number" id="9" onfocus="this.select();">

      <button type="button" onclick="roll('91')" class="fblskill">Insight</button>
      <input type="number" id="91" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('10')" class="fblskill">Manipulation</button>
      <input type="number" id="10" onfocus="this.select();">

      <button type="button" onclick="roll('11')" class="fblskill">Healing</button>
      <input type="number" id="11" onfocus="this.select();">
      <br>
      <button type="button" onclick="roll('12')" class="fblskill">Performance</button>
      <input type="number" id="12" onfocus="this.select();">

      <button type="button" onclick="roll('121')" class="fblskill">Animal Handling</button>
      <input type="number" id="121" onfocus="this.select();">
      <br>
      
      <button type="button" name="Artefact" onclick="rollArtefact('3')" class="pride">Pride</button>
      
      <button type="button" name="Armor" onclick="rollArmor()" class="item">Armor</button>
      <input type="number" id="Armor" onfocus="this.select();">
      <input type="number" id="aDamage" onfocus="this.select();" class="damage">



    </div>

    <div class="dicewindow" id="dicewin">
      <p id="dicebuttons"></p>
      <p id="result" onclick="hideDice()"></p>
    </div>
  </div>

  <p style="color: gray; text-align: center"> All icons are taken from
    <a href="https://game-icons.net" style="color: white"> game-icons.net </a>
    under the
    <a href="https://creativecommons.org/licenses/by/3.0/" style="color:white">CC BY 3.0</a>
    license
  </p>
  </div>
</body>

</html>
