<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Lantern</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/lantern_bin.json", {onProgress: UnityProgress});
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <a href="projects.html" class="menu" style="color: goldenrod;">⬅ Projects</a>
      <div id="gameContainer" style="width: 960px; height: 600px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Lantern</div>
        <br><br>
        <h2>Controls</h2>
        <p>
          <li>WASD to move </li>
          <li>Shift to sprint</li>
          <li>Space to jump</li>
          <li>LMB to punch</li>
        </p>
        <br>
        <h2>Currently working on</h2>
        <p>
          <li>Item pickups</li>
          <li>Proper combat handling</li>
          <li>Animation control</li>
          <li>Combat feedback</li>

        </p>
      </div>
    </div>
  </body>
</html>
